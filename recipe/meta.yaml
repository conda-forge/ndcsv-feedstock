{% set name = "ndcsv" %}
{% set version = "1.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/n/ndcsv/ndcsv-{{ version }}.tar.gz
  sha256: 9fca2326df40a8d420e8eea01764f658b5cdcb1f1b5902f7db8e5bc7

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}
    - numpy >=1.23
    - pandas >=1.5
    - pshell >=1.0
    - xarray >=2023.8.0

test:
  imports:
    - ndcsv
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/crusaderky/ndcsv
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: N-Dimensional CSV files for xarray

extra:
  recipe-maintainers:
    - crusaderky
